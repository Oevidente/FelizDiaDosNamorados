name: Deploy para o GitHub Pages

on:
  push:
    branches: ["main"] # Substitua por "master" se a sua branch principal tiver esse nome
  workflow_dispatch:

# Permissões necessárias para fazer o deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que deploys simultâneos entrem em conflito
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Gerar build de produção
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Fazer o upload do artefato (pasta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Executar o deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
